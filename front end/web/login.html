<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canindé | Acesso Institucional</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter'], display: ['Plus Jakarta Sans'] },
                    colors: { 
                        brand: { 
                            light: '#F8F9FA', cerrado: '#285430', river: '#0077B6', 
                            jalapao: '#D4A017', buriti: '#E67E22', earth: '#F1E9D2'
                        } 
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; background-color: #F8F9FA; color: #2D3748; }
        
        /* Fundo Topográfico COP30 (Mantendo a identidade do Dashboard) */
        .bg-topographic {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background-color: #F8F9FA;
            background-image: url("data:image/svg+xml,%3Csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3Cpattern id='topo' width='100' height='100' patternUnits='userSpaceOnUse'%3E%3Cpath d='M0 50 Q 25 25, 50 50 T 100 50' fill='none' stroke='%23285430' stroke-width='0.5' stroke-opacity='0.1'/%3E%3Cpath d='M0 70 Q 30 40, 60 70 T 100 70' fill='none' stroke='%230077B6' stroke-width='0.5' stroke-opacity='0.08'/%3E%3C/pattern%3E%3C/defs%3E%3Crect width='100%25' height='100%25' fill='url(%23topo)'/%3E%3C/svg%3E");
            animation: panBg 120s linear infinite;
        }

        /* Gradiente suave animado de fundo (Aurora do Cerrado) */
        .bg-aurora {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2;
            background: radial-gradient(circle at 10% 20%, rgba(40, 84, 48, 0.05), transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(0, 119, 182, 0.05), transparent 40%),
                        radial-gradient(circle at 50% 50%, rgba(212, 160, 23, 0.03), transparent 30%);
            animation: pulse-aurora 10s ease-in-out infinite alternate;
        }

        @keyframes panBg { from { background-position: 0 0; } to { background-position: -200px 100px; } }
        @keyframes pulse-aurora { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.1); opacity: 1; } }

        /* Card de Vidro COP30 (Glassmorphism Claro) */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 20px 40px -10px rgba(40, 84, 48, 0.1);
        }

        /* Efeito de foco nos inputs (Claro) */
        .input-glass {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #2D3748;
            transition: all 0.3s ease;
        }
        .input-glass:focus {
            background: #ffffff;
            border-color: #285430;
            outline: none;
            box-shadow: 0 0 0 3px rgba(40, 84, 48, 0.1);
        }
        .input-glass::placeholder { color: #A0AEC0; }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center p-4">

    <!-- Backgrounds Naturais da Identidade COP30 -->
    <div class="bg-aurora"></div>
    <div class="bg-topographic"></div>

    <!-- Container Principal (Formato de Cartão Identidade) -->
    <div class="w-full max-w-4xl flex flex-col md:flex-row rounded-3xl overflow-hidden shadow-2xl shadow-brand-cerrado/10 border border-white">
        
        <!-- Lado Esquerdo: Branding Institucional -->
        <div class="hidden md:flex md:w-1/2 relative bg-brand-cerrado flex-col justify-between p-10 overflow-hidden">
            <!-- Camada de fundo e textura -->
            <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1542261690-349079f18e95?auto=format&fit=crop&q=80&w=1000')] bg-cover bg-center opacity-30 mix-blend-overlay"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-brand-cerrado via-brand-cerrado/90 to-transparent"></div>
            
            <div class="relative z-10">
                <!-- Logo Conceitual COP30 -->
                <div class="relative w-16 h-16 flex items-center justify-center mb-6">
                    <div class="absolute inset-0 bg-white rounded-tl-2xl rounded-br-2xl rounded-tr-md rounded-bl-md transform rotate-45 opacity-20"></div>
                    <div class="absolute inset-1 bg-brand-jalapao rounded-tl-2xl rounded-br-2xl rounded-tr-md rounded-bl-md transform rotate-45 opacity-90 mix-blend-screen"></div>
                    <i data-lucide="leaf" class="text-white w-8 h-8 z-10 relative transform -rotate-12"></i>
                </div>
                <h1 class="font-display font-extrabold text-4xl text-white tracking-tight leading-none mb-2">Projeto<br>Canindé</h1>
                <p class="text-brand-jalapao font-bold text-sm tracking-widest uppercase">Guardião do Cerrado</p>
            </div>

            <div class="relative z-10">
                <p class="text-white/80 font-medium leading-relaxed mb-6 border-l-2 border-brand-jalapao pl-4">
                    Plataforma Oficial de Inteligência Ambiental, Restauração e Bioeconomia do Estado do Tocantins.
                </p>
                <div class="flex gap-2">
                    <span class="bg-white/10 text-white text-[10px] font-bold px-2 py-1 rounded uppercase backdrop-blur-sm border border-white/20">Acesso Restrito</span>
                    <span class="bg-white/10 text-white text-[10px] font-bold px-2 py-1 rounded uppercase backdrop-blur-sm border border-white/20">Gov.br</span>
                </div>
            </div>
        </div>

        <!-- Lado Direito: Área de Login (Glassmorphism Claro) -->
        <div class="w-full md:w-1/2 glass-card p-10 flex flex-col justify-center relative">
            
            <div class="mb-8 text-center md:text-left">
                <!-- Logo visível apenas no mobile -->
                <div class="md:hidden w-12 h-12 rounded-xl bg-brand-cerrado flex items-center justify-center mx-auto mb-4 shadow-lg shadow-brand-cerrado/30">
                    <i data-lucide="leaf" class="text-white w-6 h-6"></i>
                </div>
                <h2 class="font-display font-extrabold text-2xl text-gray-900 tracking-tight">Acesso CICC</h2>
                <p class="text-sm text-gray-500 font-medium mt-1">Identifique-se para acessar o painel</p>
            </div>

            <!-- Formulário de Login -->
            <form action="dashboard.html" method="GET" class="space-y-5">
                
                <!-- Campo Matrícula/Email -->
                <div>
                    <label class="block text-xs font-bold text-brand-cerrado uppercase tracking-wider mb-2" for="email">Credencial ou Matrícula</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-4 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input type="text" id="email" placeholder="Ex: TO-4921 ou email@to.gov.br" required class="input-glass w-full rounded-xl py-3.5 pl-12 pr-4 text-sm font-medium" autocomplete="off">
                    </div>
                </div>

                <!-- Campo Senha -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-xs font-bold text-brand-cerrado uppercase tracking-wider" for="password">Senha de Acesso</label>
                        <a href="#" class="text-xs font-bold text-brand-river hover:text-blue-800 transition hover:underline">Esqueceu a senha?</a>
                    </div>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input type="password" id="password" placeholder="••••••••" required class="input-glass w-full rounded-xl py-3.5 pl-12 pr-10 text-sm font-medium">
                        <button type="button" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-brand-cerrado transition">
                            <i data-lucide="eye" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

                <!-- Ações -->
                <div class="pt-4">
                    <button type="submit" class="w-full bg-brand-cerrado hover:bg-green-800 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-brand-cerrado/20 flex justify-center items-center gap-2">
                        Autenticar Acesso <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>
                    
                    <button type="button" class="w-full mt-3 bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 font-bold py-3.5 rounded-xl transition flex justify-center items-center gap-2">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Logo_Gov_br.png" alt="Gov.br" class="h-4 object-contain opacity-80 grayscale">
                        Entrar com Gov.br
                    </button>
                </div>
            </form>

            <!-- Rodapé / Redirecionamento -->
            <div class="mt-8 text-center border-t border-gray-200 pt-6">
                <p class="text-sm text-gray-500">Primeiro acesso institucional?</p>
                <a href="cadastro.html" class="inline-flex items-center gap-1 mt-2 font-bold text-brand-river hover:text-blue-800 transition">
                    Solicitar Cadastro ao Naturatins <i data-lucide="chevron-right" class="w-4 h-4"></i>
                </a>
            </div>
            
        </div>
    </div>

    <!-- Scripts -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
