<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canindé | Alertas IA (Sweep)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <!-- Leaflet CSS (Mapas) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter'], display: ['Plus Jakarta Sans'] },
                    colors: { 
                        brand: { 
                            light: '#F8F9FA', cerrado: '#285430', river: '#0077B6', 
                            jalapao: '#D4A017', buriti: '#E67E22', fire: '#D62828'
                        } 
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="caninde.css">
</head>
<body class="flex h-screen w-screen overflow-hidden">

    <!-- Background Animado -->
    <div class="bg-topographic"></div>

    <div id="sidebar-placeholder" data-pagina-ativa="alertas"></div>

    <!-- ÁREA PRINCIPAL -->
    <main class="flex-1 flex flex-col h-full relative z-10 overflow-hidden w-full">
        
        <!-- Header Superior -->
        <header class="h-20 glass-panel border-b border-gray-200/50 flex items-center justify-between px-4 lg:px-6 shrink-0 z-20">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="lg:hidden text-gray-600 hover:text-brand-cerrado bg-white/50 border border-gray-200 p-2 rounded-lg transition shadow-sm">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
                <div>
                    <h2 class="font-display font-extrabold text-xl lg:text-2xl text-gray-900 leading-tight">Monitoramento Ativo</h2>
                    <p class="text-[10px] lg:text-xs text-gray-500 font-medium flex items-center gap-1 mt-0.5">
                        <i data-lucide="shield-check" class="w-3 h-3 text-brand-river"></i> Satélite Brasil Mais + Protege
                    </p>
                </div>
            </div>
            
            <div class="relative hidden sm:block w-64">
                <i data-lucide="search" class="absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                <input id="search-input" type="text" placeholder="Buscar Nº CAR ou Município..." class="w-full text-sm input-custom rounded-xl pl-9 pr-3 py-2 text-gray-700 placeholder-gray-400" autocomplete="off">
                <div id="search-results" class="hidden absolute top-full mt-1 left-0 w-full bg-white border border-gray-200 rounded-xl shadow-lg z-50 overflow-hidden"></div>
            </div>
        </header>

        <!-- Container Rolável do Dashboard -->
        <div class="flex-1 overflow-x-hidden overflow-y-auto p-4 lg:p-6 flex flex-col gap-6">
            
            <!-- GRID SUPERIOR: MAPA + FILA (Adapta para mobile) -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 h-auto lg:h-[420px] shrink-0">
                
                <!-- MAPA LEAFLET -->
                <div class="lg:col-span-2 glass-panel rounded-2xl p-2 relative flex flex-col border border-gray-200 shadow-sm h-[300px] lg:h-full">
                    <div class="absolute top-4 left-4 z-[20] flex flex-col gap-2 pointer-events-none">
                        <div class="bg-white/90 backdrop-blur border border-gray-200 px-3 py-2 rounded-lg shadow-sm flex items-center gap-2">
                            <span class="flex h-2.5 w-2.5 relative">
                              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand-river opacity-75"></span>
                              <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-brand-river"></span>
                            </span>
                            <span class="text-xs font-bold text-gray-800 tracking-wide uppercase">Sweep IA Online</span>
                        </div>
                    </div>
                    
                    <div id="map" class="w-full h-full rounded-xl relative bg-gray-100 overflow-hidden">
                        <!-- Animação do Scanner da IA -->
                        <div class="scanner-line"></div>
                    </div>
                </div>

                <!-- FILA DE TRIAGEM RÁPIDA -->
                <div class="glass-panel rounded-2xl border border-gray-200 shadow-sm flex flex-col h-[300px] lg:h-full overflow-hidden">
                    <div class="px-5 py-4 border-b border-gray-100 bg-white/60 backdrop-blur flex justify-between items-center">
                        <h3 class="font-display font-bold text-gray-800 text-sm">Triagem Pendente</h3>
                        <span id="triagem-count" class="text-[10px] bg-brand-fire/10 text-brand-fire font-bold px-2 py-0.5 rounded border border-brand-fire/20">— Alertas</span>
                    </div>
                    
                    <div id="triagem-feed" class="flex-1 overflow-y-auto p-4 space-y-3">
                        <div class="text-center py-6 text-gray-400 text-xs">Carregando...</div>
                    </div>
                </div>
            </div>

            <!-- GRID INFERIOR: TABELA DATAGRID -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 flex flex-col overflow-hidden">
                
                <!-- Barra de Ações e Filtros Customizados -->
                <div class="p-4 border-b border-gray-100 bg-gray-50/50 flex flex-col md:flex-row gap-4 items-center justify-between">
                    
                    <div class="flex w-full md:w-auto flex-col sm:flex-row gap-3">
                        <!-- Dropdown 1: Risco -->
                        <div class="relative custom-dropdown" id="dd-risco-wrapper">
                            <button type="button" onclick="toggleDropdown('dd-risco')" class="w-full sm:w-48 flex items-center justify-between text-xs input-custom rounded-lg px-3 py-2 text-gray-700 font-bold">
                                <span id="dd-risco-selected" class="flex items-center gap-2"><i data-lucide="filter" class="w-3 h-3 text-gray-400"></i> Todos os Riscos</span>
                                <i data-lucide="chevron-down" id="dd-risco-icon" class="w-4 h-4 text-gray-400 transition-transform duration-200"></i>
                            </button>
                            <div id="dd-risco-menu" class="absolute z-50 w-full mt-1 bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden hidden opacity-0 transition-opacity">
                                <ul class="py-1 text-xs font-medium">
                                    <li><button onclick="selectOption('dd-risco', 'Todos os Riscos')" class="w-full text-left px-4 py-2 hover:bg-gray-50 text-gray-700">Todos os Riscos</button></li>
                                    <li><button onclick="selectOption('dd-risco', 'Crítico (Fogo)')" class="w-full text-left px-4 py-2 hover:bg-red-50 text-brand-fire">Crítico (Fogo)</button></li>
                                    <li><button onclick="selectOption('dd-risco', 'Alto (Desmate)')" class="w-full text-left px-4 py-2 hover:bg-yellow-50 text-brand-jalapao">Alto (Desmate)</button></li>
                                </ul>
                            </div>
                        </div>

                        <!-- Dropdown 2: Porte CAR -->
                        <div class="relative custom-dropdown" id="dd-car-wrapper">
                            <button type="button" onclick="toggleDropdown('dd-car')" class="w-full sm:w-48 flex items-center justify-between text-xs input-custom rounded-lg px-3 py-2 text-gray-700 font-bold">
                                <span id="dd-car-selected" class="flex items-center gap-2"><i data-lucide="layers" class="w-3 h-3 text-gray-400"></i> Porte do CAR</span>
                                <i data-lucide="chevron-down" id="dd-car-icon" class="w-4 h-4 text-gray-400 transition-transform duration-200"></i>
                            </button>
                            <div id="dd-car-menu" class="absolute z-50 w-full mt-1 bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden hidden opacity-0 transition-opacity">
                                <ul class="py-1 text-xs font-medium">
                                    <li><button onclick="selectOption('dd-car', 'Qualquer Porte')" class="w-full text-left px-4 py-2 hover:bg-gray-50 text-gray-700">Qualquer Porte</button></li>
                                    <li><button onclick="selectOption('dd-car', 'Grande Porte')" class="w-full text-left px-4 py-2 hover:bg-gray-50 text-gray-700">Grande Porte</button></li>
                                    <li><button onclick="selectOption('dd-car', 'Médio Porte')" class="w-full text-left px-4 py-2 hover:bg-gray-50 text-gray-700">Médio Porte</button></li>
                                </ul>
                            </div>
                        </div>
                    </div>

                    <button id="btn-sweep" onclick="forcarVarredura()" class="w-full md:w-auto bg-brand-cerrado hover:bg-green-800 text-white text-xs font-bold px-4 py-2 rounded-lg transition shadow-sm flex items-center justify-center gap-2">
                        <i data-lucide="refresh-cw" class="w-3 h-3"></i> Forçar Varredura (Sweep)
                    </button>
                </div>

                <!-- Tabela Responsiva (Overflow horizontal no mobile) -->
                <div class="w-full overflow-x-auto">
                    <table class="w-full text-left whitespace-nowrap">
                        <thead>
                            <tr class="bg-gray-100/50 text-gray-500 text-[10px] font-bold uppercase tracking-wider border-b border-gray-200">
                                <th class="px-6 py-4">ID Incidente</th>
                                <th class="px-6 py-4">Detecção / Fonte</th>
                                <th class="px-6 py-4">Localização (Polígono/CAR)</th>
                                <th class="px-6 py-4">Status Licença</th>
                                <th class="px-6 py-4 text-right">Ação Módulo Gov</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-body" class="text-sm text-gray-800 divide-y divide-gray-100">
                            <tr><td colspan="5" class="px-6 py-8 text-center text-gray-400 text-xs">Carregando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    

    <script src="caninde-shared.js"></script>
    <script src="alertas.js"></script>
</body>
</html>
