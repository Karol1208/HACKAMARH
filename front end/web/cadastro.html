<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canindé | Solicitação de Acesso</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter'], display: ['Plus Jakarta Sans'] },
                    colors: { 
                        brand: { 
                            light: '#F8F9FA', cerrado: '#285430', river: '#0077B6', 
                            jalapao: '#D4A017', buriti: '#E67E22', earth: '#F1E9D2'
                        } 
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="caninde.css">
</head>
<body class="min-h-screen w-screen flex items-center justify-center p-4 py-10">

    <div class="bg-aurora"></div>
    <div class="bg-topographic"></div>

    <!-- Container Principal do Cadastro -->
    <div class="glass-card w-full max-w-2xl rounded-3xl p-8 md:p-10 relative overflow-hidden">
        
        <div class="relative z-10">
            
            <!-- Header do Cadastro -->
            <div class="flex items-start md:items-center gap-4 mb-8 pb-6 border-b border-gray-200">
                <div class="w-14 h-14 rounded-2xl bg-brand-river/10 border border-brand-river/20 flex items-center justify-center shrink-0">
                    <i data-lucide="shield-check" class="w-7 h-7 text-brand-river"></i>
                </div>
                <div>
                    <h2 class="font-display font-extrabold text-2xl text-gray-900 tracking-tight">Solicitação de Acesso</h2>
                    <p class="text-xs text-gray-500 font-medium mt-1 leading-relaxed">
                        Preencha o formulário institucional. Seu acesso à plataforma Canindé será liberado pela Auditoria da SEMARH.
                    </p>
                </div>
            </div>

            <!-- Formulário de Cadastro -->
            <form id="form-cadastro" class="space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    <!-- Nome Completo -->
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-2">Nome Completo do Servidor</label>
                        <div class="relative">
                            <i data-lucide="user" class="absolute left-4 top-1/2 transform -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                            <input id="c-nome" type="text" placeholder="Conforme funcional" required class="input-glass w-full rounded-xl py-3 pl-10 pr-4 text-sm font-medium" autocomplete="off">
                        </div>
                    </div>

                    <!-- Email Institucional -->
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-2">E-mail Institucional</label>
                        <div class="relative">
                            <i data-lucide="mail" class="absolute left-4 top-1/2 transform -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                            <input id="c-email" type="email" placeholder="exemplo@to.gov.br" required class="input-glass w-full rounded-xl py-3 pl-10 pr-4 text-sm font-medium" autocomplete="off">
                        </div>
                    </div>

                    <!-- Órgão Lotação -->
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-2">Órgão de Lotação</label>
                        <div class="relative">
                            <i data-lucide="building-2" class="absolute left-4 top-1/2 transform -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                            <select id="c-orgao" required class="input-glass w-full rounded-xl py-3 pl-10 pr-4 text-sm font-medium appearance-none cursor-pointer">
                                <option value="" disabled selected>Selecione a secretaria</option>
                                <option value="semarh">SEMARH (Sec. de Meio Ambiente)</option>
                                <option value="naturatins">Naturatins</option>
                                <option value="bombeiros">Corpo de Bombeiros (CBM-TO)</option>
                                <option value="sedesc">SEDESC</option>
                            </select>
                            <i data-lucide="chevron-down" class="absolute right-4 top-1/2 transform -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"></i>
                        </div>
                    </div>

                    <!-- Matrícula -->
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-2">Matrícula / Funcional</label>
                        <div class="relative">
                            <i data-lucide="badge-check" class="absolute left-4 top-1/2 transform -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                            <input id="c-matricula" type="text" placeholder="ID Funcional" required class="input-glass w-full rounded-xl py-3 pl-10 pr-4 text-sm font-mono font-medium" autocomplete="off">
                        </div>
                    </div>
                    
                </div>

                <!-- Termo de Responsabilidade (Destaque Institucional) -->
                <div class="mt-2 bg-brand-river/5 border border-brand-river/20 rounded-xl p-4 flex gap-3 items-start shadow-sm">
                    <input type="checkbox" id="termo" required class="mt-1 w-4 h-4 rounded border-gray-300 text-brand-river focus:ring-brand-river cursor-pointer">
                    <label for="termo" class="text-xs text-gray-600 font-medium leading-relaxed cursor-pointer">
                        Declaro ter ciência de que o <strong class="text-brand-river">Projeto Canindé</strong> processa dados geoespaciais e ambientais do Governo do Tocantins. O uso indevido constitui infração administrativa.
                    </label>
                </div>

                <!-- Ações -->
                <div class="flex flex-col sm:flex-row gap-4 pt-4">
                    <a href="login.html" class="w-full sm:w-1/3 bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 font-bold py-3.5 rounded-xl transition flex justify-center items-center gap-2">
                        <i data-lucide="arrow-left" class="w-4 h-4"></i> Voltar
                    </a>
                    <button type="submit" class="w-full sm:w-2/3 bg-brand-river hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition shadow-lg shadow-brand-river/20 flex justify-center items-center gap-2">
                        Enviar para Aprovação <i data-lucide="send" class="w-4 h-4"></i>
                    </button>
                </div>
            </form>

        </div>
    </div>

    <script src="cadastro.js"></script>

    
</body>
</html>
